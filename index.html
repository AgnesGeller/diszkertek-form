<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Díszkertek – Helyszíni felmérés</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="icon" href="./assets/favicon64.png">
    

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
</head>

<body>


<!-- HERO -->
<section class="hero">
    <img src="./assets/hero.jpg" alt="hero" class="hero-img">

    <button onclick="startForm()" class="btn btn-success hero-btn">
        Kezdés
    </button>
</section>

<div class="progress-wrapper mb-4">

    <div class="progress">
        <div id="progressBar" class="progress-bar" style="width: 33%"></div>
    </div>

    <div class="step-indicator mt-2">
    <span class="step active">1</span>
    <span class="step">2</span>
    <span class="step">3</span>
    <span class="step">4</span>
</div>

</div>

<!-- FORM WRAPPER -->
<div class="container mt-5 mb-5">

    <form id="surveyForm">

       <!-- STEP 1 -->
<div class="form-step active">
    <h3>I. Alapadatok</h3>
    <!-- NÉV -->
<label>Név</label>
<input type="text" class="form-control mb-3" name="nev" required>

<!-- EMAIL -->
<label>Email</label>
<input type="email" class="form-control mb-3" name="email" required autocomplete="email">

    <!-- DÁTUM -->
    <label>Dátum</label>
    <input type="date" class="form-control mb-3" name="datum" required>

    <!-- CÍM -->
    <label>Helyszín címe</label>
    <input type="text" class="form-control mb-3" name="cim" required>

    <!-- LAKÓÖVEZET -->
    <label>Lakóövezeti besorolás</label>
    <select class="form-select mb-3" name="ovezet" required>
        <option value="">Válassz</option>
        <option value="kertvaros">Kertváros</option>
        <option value="belvaros">Belváros</option>
        <option value="falusi">Falusi</option>
        <option value="ipari">Ipari</option>
        <option value="egyeb">Egyéb</option>
    </select>

    <!-- TÁVOLSÁG -->
    <label>Kiszállási távolság (km)</label>
    <input type="number" class="form-control mb-3" name="tavolsag" required>

    <!-- SZÁLLÁS -->
    <label>Szállás biztosított?</label>
    <select class="form-select mb-2" name="szallas" onchange="toggleSzallas(this.value)">
        <option value="nem">Nem</option>
        <option value="igen">Igen</option>
        <option value="talan">Talán</option>
    </select>

    <!-- SZÁLLÁS EXTRA -->
    <div id="szallasExtra" style="display:none;">
        <input type="text" class="form-control mb-3" name="szallasMegjegyzes" placeholder="Részletek (pl. hány fő, milyen szállás)">
    </div>

    <!-- TELEK -->
    <label>Telek mérete (m²)</label>
    <input type="number" class="form-control mb-3" name="telekMeret" required>

    <!-- TERVEZÉSI TERÜLET -->
    <label>Tervezési terület mérete (m²)</label>
    <input type="number" class="form-control mb-3" name="tervezesiTerulet">

    <!-- DOKUMENTUMOK -->
<label class="mt-3">Átadott dokumentumok</label>

<select class="form-select mb-3" name="dokumentumok" multiple size="4">
    <option value="tervrajz">Tervrajz</option>
    <option value="geodezia">Geodéziai felmérés</option>
    <option value="helyszinrajz">Helyszínrajz</option>
    <option value="epitesi">Építési engedély</option>
    <option value="latvany">Látványterv</option>
    <option value="fotok">Fotók</option>
    <option value="inspiracio">Inspirációs képek</option>
    <option value="kivitelezesi">Kivitelezési terv</option>
</select>

<!-- EGYÉB -->
<input type="text" class="form-control mb-3" name="egyebDokumentum" placeholder="Egyéb dokumentum">

<!-- MEGJEGYZÉS -->
<textarea class="form-control mb-3" name="megjegyzes" rows="2" placeholder="Megjegyzés"></textarea>
<button type="button" class="btn btn-primary next-btn">Tovább</button>
</div>


        <!-- STEP 2 -->
        <div class="form-step">
            <h3>II. Funkcionális igények</h3>

            <label>Mit szeretne?</label>

            <div class="form-check">
                <input class="form-check-input" type="checkbox" name="igeny" value="pihenes">
                <label class="form-check-label">Pihenés</label>
            </div>

            <div class="form-check">
                <input class="form-check-input" type="checkbox" name="igeny" value="kozossegi">
                <label class="form-check-label">Közösségi tér</label>
            </div>

            <div class="form-check">
                <input class="form-check-input" type="checkbox" name="igeny" value="sutofőzes">
                <label class="form-check-label">Sütés-főzés</label>
            </div>

            <button type="button" class="btn btn-secondary prev-btn">Vissza</button>
            <button type="button" class="btn btn-primary next-btn">Tovább</button>
        </div>

        <!-- STEP 3 -->
        <div class="form-step">
            <h3>Költségkeret</h3>

            <select class="form-select" name="koltseg" required>
                <option>1M Ft alatt</option>
                <option>1–2M Ft</option>
                <option>2–4M Ft</option>
                <option>4–7M Ft</option>
                <option>7–10M Ft</option>
                <option>10M Ft felett</option>
            </select>

            <button type="button" class="btn btn-secondary prev-btn">Vissza</button>
            <button type="button" class="btn btn-primary next-btn">Tovább</button>
        </div>


         <!-- STEP 4 -->
        <div class="form-step">
    <h3>III. Vizuális és fenntartási igények</h3>

    <div class="mb-3">
        <label>Oldalsó takarás szükséges?</label>
        <input type="text" class="form-control" name="takaras">
    </div>

    <div class="form-check">
        <input class="form-check-input" type="checkbox" name="ontozes" value="automata">
        <label class="form-check-label">Automata öntözőrendszer</label>
    </div>

    
    <button type="button" class="btn btn-secondary prev-btn">Vissza</button>
    <button type="button" id="submitBtn" class="btn btn-success">Küldés</button>
</div>

    </form>

</div>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center p-3">
    <p>+36706349630 | info@diszkertek.hu</p>
    <p>www.diszkertek.hu</p>
    <p>Copyright © 2026 by Díszkertek. Minden jog fenntartva.</p>
</footer>

    emailjs.init("qpVyaXcVPNpkX8yHa");
})();
</script>

<script src="./js/app.js"></script>

</body>
</html>
